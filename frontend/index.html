<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/atom.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neutron Portal</title>
    <link href="../frontend/src/index.css" rel="stylesheet"/>
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#6366f1" />
    <!-- Apple touch icon -->
    <link rel="apple-touch-icon" href="/favicon.ico" />
    <!-- Service Worker Registration (skipped in dev to avoid stale cache after Vite downgrade) -->
    <script>
      if ('serviceWorker' in navigator) {
        const isDev = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
        if (isDev) {
          // Unregister any existing service worker and clear caches in development
          navigator.serviceWorker.getRegistrations().then(regs => {
            regs.forEach(reg => reg.unregister());
          });
          caches.keys().then(names => names.forEach(name => caches.delete(name)));
        } else {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
          });
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
